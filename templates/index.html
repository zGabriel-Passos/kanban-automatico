<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Micro SDLC - Plan, Build, Review and Ship</title>
</head>

<body>
    <header class="app-header">
        <div class="header-brand">
            <div>
                <p class="eyebrow">Agent Workflow Board</p>
                <h1>Micro SDLC</h1>
            </div>
            <p class="header-subtitle">Plan, Build, Review and Ship agents</p>
        </div>
        <div class="header-actions">
            <div class="status" id="status-workflow">
                <span class="status-dot" id="circle-status"></span>
                <span id="status-text">0 tasks</span>
            </div>
            <p class="workflow-hint">Plan → Build → Review → Ship</p>
            <button id="theme" aria-label="Alternar tema">☀</button>
        </div>
    </header>

    <main class="board-shell">
        <section class="board">
            <div class="columns">
                <div class="column idle-column">
                    <div class="column-header">
                        <div class="column-title">
                            <h3>IDLE</h3>
                            <span class="column-count" data-count-for="idle">0</span>
                        </div>
                        <button class="add-task-btn" id="addTaskBtn">+ New Ticket</button>
                    </div>
                    <div class="tasks-container" data-column="idle" data-empty-text="No tickets"></div>
                </div>

                <div class="column plan-column">
                    <div class="column-header">
                        <div class="column-title">
                            <h3>PLAN</h3>
                            <span class="column-count" data-count-for="plan">0</span>
                        </div>
                    </div>
                    <div class="tasks-container" data-column="plan" data-empty-text="No tickets"></div>
                </div>

                <div class="column build-column">
                    <div class="column-header">
                        <div class="column-title">
                            <h3>BUILD</h3>
                            <span class="column-count" data-count-for="build">0</span>
                        </div>
                    </div>
                    <div class="tasks-container" data-column="build" data-empty-text="No tickets"></div>
                </div>

                <div class="column review-column">
                    <div class="column-header">
                        <div class="column-title">
                            <h3>REVIEW</h3>
                            <span class="column-count" data-count-for="review">0</span>
                        </div>
                    </div>
                    <div class="tasks-container" data-column="review" data-empty-text="No tickets"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="taskModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Nova Tarefa</h2>
            <form id="taskForm">
                <input type="text" id="taskTitle" placeholder="Nome da tarefa" required>
                <div class="form-row">
                    <input type="text" id="taskFolder" placeholder="Pasta de destino (ex: output)" required>
                    <select id="taskFileType">
                        <option value="md">.md</option>
                        <option value="html">.html</option>
                        <option value="js">.js</option>
                    </select>
                </div>
                <textarea id="taskPrompt" placeholder="Instruções para a IA — descreva o que quer criar..." rows="5" required></textarea>
                <button type="submit">Criar Tarefa</button>
            </form>
        </div>
    </div>

    <div id="planModal" class="modal">
        <div class="modal-content modal-wide">
            <span class="close-plan">&times;</span>
            <h2>Plano da IA</h2>
            <div class="plan-content">
                <textarea id="planText" spellcheck="false"></textarea>
            </div>
            <div class="plan-actions">
                <button id="confirmBuild" class="btn-confirm">Confirmar e Buildar</button>
            </div>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content modal-wide">
            <span class="close-detail">&times;</span>
            <h2>Detalhes da Tarefa</h2>
            <div id="detailContent" class="detail-content"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
