<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>KanBan AI - Plan, Build and Review</title>
</head>

<body>
    <header>
        <h2>KanBan AI</h2>
        <div class="status" id="status-workflow">
            <span id="circle-status">🟢</span>
            <span id="status-text">0 tasks</span>
        </div>
        <button id="theme">🌞</button>
    </header>

    <main>
        <div class="columns">

            <!-- IDLE -->
            <div class="column">
                <div class="column-header">
                    <h3>IDLE</h3>
                    <button class="add-task-btn" id="addTaskBtn">+</button>
                </div>
                <div class="tasks-container" data-column="idle"></div>
            </div>

            <!-- PLAN -->
            <div class="column">
                <h3>Plan</h3>
                <div class="tasks-container" data-column="plan"></div>
            </div>

            <!-- BUILD -->
            <div class="column">
                <h3>Build</h3>
                <div class="tasks-container" data-column="build"></div>
            </div>

            <!-- REVIEW -->
            <div class="column">
                <h3>Review</h3>
                <div class="tasks-container" data-column="review"></div>
            </div>

        </div>
    </main>

    <!-- Modal: Nova Tarefa -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Nova Tarefa</h2>
            <form id="taskForm">
                <input type="text" id="taskTitle" placeholder="Nome da tarefa" required>
                <div class="form-row">
                    <input type="text" id="taskFolder" placeholder="Pasta de destino (ex: output)" required>
                    <select id="taskFileType">
                        <option value="md">.md</option>
                        <option value="html">.html</option>
                        <option value="js">.js</option>
                    </select>
                </div>
                <textarea id="taskPrompt" placeholder="Instruções para a IA — descreva o que quer criar..." rows="5" required></textarea>
                <button type="submit">Criar Tarefa</button>
            </form>
        </div>
    </div>

    <!-- Modal: Plano da IA -->
    <div id="planModal" class="modal">
        <div class="modal-content modal-wide">
            <span class="close-plan">&times;</span>
            <h2>📋 Plano da IA</h2>
            <div class="plan-content">
                <textarea id="planText" spellcheck="false"></textarea>
            </div>
            <div class="plan-actions">
                <button id="confirmBuild" class="btn-confirm">🔨 Confirmar e Buildar</button>
            </div>
        </div>
    </div>

    <!-- Modal: Detalhes da Task -->
    <div id="detailModal" class="modal">
        <div class="modal-content modal-wide">
            <span class="close-detail">&times;</span>
            <h2>📄 Detalhes da Tarefa</h2>
            <div id="detailContent" class="detail-content"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
